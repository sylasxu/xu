name: GenUI Regression

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/miniprogram/**"
      - "packages/genui-contract/**"
      - "scripts/genui-*.ts"
      - "turbo.json"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/miniprogram/**"
      - "packages/genui-contract/**"
      - "scripts/genui-*.ts"
      - "turbo.json"
      - "package.json"
      - "bun.lock"

jobs:
  genui-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Type Check (API + Web)
        run: |
          bunx tsc --noEmit -p apps/api/tsconfig.json
          bunx tsc --noEmit -p apps/web/tsconfig.json

      - name: Architecture Consistency Check
        run: bun run arch:check

      - name: Start API Server
        env:
          API_PORT: "1996"
          API_HOST: "127.0.0.1"
          DATABASE_URL: "postgres://postgres:password@127.0.0.1:5432/juchang"
          JWT_SECRET: "ci-jwt-secret"
        run: |
          bun --cwd apps/api src/index.ts > /tmp/juchang-api.log 2>&1 &
          echo $! > /tmp/juchang-api.pid

      - name: Wait For API Health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:1996/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API server failed to start within 40s"
          cat /tmp/juchang-api.log || true
          exit 1

      - name: Run GenUI Regression (turns/parity/snapshot)
        run: bun run genui:regression

      - name: Print API Logs On Failure
        if: failure()
        run: cat /tmp/juchang-api.log || true

      - name: Stop API Server
        if: always()
        run: |
          if [ -f /tmp/juchang-api.pid ]; then
            kill "$(cat /tmp/juchang-api.pid)" || true
          fi
